site_name: XDG Desktop Entry

repo_name: XDG Desktop Entry for Python
repo_url: https://github.com/jassielof/xdg-desktop-entry-python

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            docstring_style: google

markdown_extensions:
  - pymdownx.snippets:
      auto_append:
        - docs/abbreviations.md

nav:
  - Home: index.md
  - API Reference: reference.md
